name: Update Data

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr2", "jsonlite", "dplyr", "purrr", "DBI", "RSQLite", "tibble", "stringr", "googlesheets4", "gargle"))'

      # --- Packages ---

      - name: Scrape packages from all sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'source("R/scrape_packages.R"); run_scrape()'

      - name: Build database
        run: |
          Rscript -e 'source("R/build_database.R"); build_database()'

      - name: Import submitted packages
        run: |
          Rscript -e 'source("R/import_submitted.R"); import_submitted_packages()'

      - name: Export JSON files
        run: |
          Rscript -e 'source("R/export_json.R"); export_all()'

      # --- Discover ---

      - name: Fetch discover data
        run: |
          Rscript -e 'source("R/fetch_discover.R"); run_discover_fetch()'

      - name: Fetch R Weekly packages
        run: |
          Rscript -e 'source("R/scrape_rweekly.R"); scrape_rweekly()'

      # --- Reviews ---

      - name: Create service account credentials file
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > /tmp/service-account.json

      - name: Fetch reviews from Google Sheets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: |
          Rscript scripts/fetch_reviews.R "${{ secrets.GOOGLE_SHEET_ID }}"

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/service-account.json

      # --- Commit everything at once ---

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Weekly data update

          - Scraped packages from all sources
          - Updated discover section and R Weekly packages
          - Updated reviews from Google Sheets"
          git push
